# CI/CD для TestAspire — сборка и публикация образа в GitHub Container Registry
# При push в main собирает Docker-образ и пушит в ghcr.io

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata for server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/testaspire-server
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Extract metadata for CRM
        id: meta-crm
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/testaspire-crm
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CRM
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.crm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-crm.outputs.tags }}
          labels: ${{ steps.meta-crm.outputs.labels }}
          build-args: |
            VITE_INVITATION_BASE_URL=${{ secrets.INVITATION_BASE_URL || 'https://weding.zorin-server.ru' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify redeploy
        if: success() && github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.COOLIFY_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" || true
          fi
