# Переопределения — сохраняются при повторном aspire publish
# SQLite: путь внутри контейнера + volume для персистентности
# URL: для генерации абсолютных ссылок
# image и ports — значения по умолчанию, если Coolify не передаёт переменные
# CRM — отдельный сервис (nginx) для weding-crm.zorin-server.ru

services:
  server:
    image: ghcr.io/dizory/testaspire-server:latest
    ports:
      - "8080"
    environment:
      ConnectionStrings__invitations: "Data Source=/data/invitations.db;Cache=Shared;Mode=ReadWriteCreate"
      ASPNETCORE_APPLICATION_URL: "https://weding.zorin-server.ru"
    volumes:
      - invitations-data:/data

  crm:
    image: ghcr.io/dizory/testaspire-crm:latest
    ports:
      - "80"
    depends_on:
      - server

volumes:
  invitations-data: {}
